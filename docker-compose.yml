services:

  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: mlflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow_secure_pwd_2024
      POSTGRES_DB: mlflow_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - mlflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Optimización PostgreSQL para 8 GB RAM
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
      -c max_connections=20
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    shm_size: '256mb'
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── MLflow Tracking Server ───
  mlflow-server:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    container_name: mlflow-tracking
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_URI: postgresql://mlflow:mlflow_secure_pwd_2024@postgres:5432/mlflow_db
      MLFLOW_ARTIFACT_ROOT: gs://-mlflow-artifacts/mlflow-artifacts
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-credentials
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/run/secrets/gcp-credentials:ro
    networks:
      - mlflow-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: mlflow-nginx
    restart: unless-stopped
    depends_on:
      - mlflow-server
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - mlflow-net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # ─── Model Serving (perfil separado, se levanta on-demand) ───
  mlflow-serving:
    build:
      context: ./docker/serving
      dockerfile: Dockerfile
    container_name: mlflow-serving
    restart: unless-stopped
    depends_on:
      - mlflow-server
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
      MODEL_NAME: wine-quality-random_forest-best
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-credentials
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/run/secrets/gcp-credentials:ro
    networks:
      - mlflow-net
    profiles:
      - serving
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

networks:
  mlflow-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
